        #track-list-container, #video-list-container { margin: 15px 0; display: flex; flex-direction: column; gap: 10px; }
        .track-card { background: rgba(22, 22, 33, 0.45); padding: 12px 18px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.03); display: flex; justify-content: space-between; align-items: center; transition: all 0.25s ease; }

        .video-thumb { width: 100px; height: 65px; border-radius: 8px; object-fit: cover; }

        .see-more-container { margin-bottom: 35px; }
        .btn-see-more { background: transparent; color: #00f2fe; border: none; font-size: 0.85rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 5px; }
        .button-group { margin-bottom: 30px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 0.95rem; margin: 10px 0; text-transform: uppercase; }
        .btn-gumroad { background: linear-gradient(45deg, #ff2a5f, #ff5e00); color: #ffffff; }
        .btn-kofi { background: #29abe2; color: #ffffff; }
        .social-section { margin-top: 25px; text-align: left; }
        .social-grid { display: flex; justify-content: flex-start; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
        .social-item { display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); width: 50px; height: 50px; border-radius: 14px; text-decoration: none; color: #94a3b8; transition: all 0.25s ease; }
        .social-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); }
        .social-item.ig:hover { border-color: #e1306c; color: #e1306c; }
        .social-item.fb:hover { border-color: #1877f2; color: #1877f2; }
        .social-item.tt:hover { border-color: #00f2fe; color: #00f2fe; }
        .social-item.th:hover { border-color: #ffffff; color: #ffffff; }
        .social-item.pin:hover { border-color: #bd081c; color: #bd081c; }
        .social-item.yt:hover { border-color: #ff0000; color: #ff0000; }
        .social-item.sc:hover { border-color: #ff5500; color: #ff5500; }
        .affiliate-market-section { margin-top: 25px; text-align: left; }
        .market-grid { display: flex; justify-content: flex-start; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
        .market-item { display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); width: 90px; height: 50px; border-radius: 14px; text-decoration: none; padding: 5px; transition: all 0.25s ease; }
        .market-item .ali-custom-text { font-size: 0.65rem; font-weight: 800; color: #ffffff; text-transform: uppercase; text-align: center; width: 100%; }
        .market-item:hover { border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); transform: translateY(-3px); }
        footer { margin-top: 35px; color: #475569; font-size: 0.75rem; border-top: 1px solid rgba(255, 255, 255, 0.04); padding-top: 18px; }
    </style>
</head>
<body>

    <!-- =========================================
         JAVASCRIPT CORE LOGIC WITH STABLE SPEECH ENGINE
    ========================================= -->
    <script>
        let cachedTracks = [], cachedVideos = [], showAllTracks = false, showAllVideos = false;
        const MARKET_GIST_URL = "https://gist.githubusercontent.com/rhythmic-beats-genz/462450b5a5a144f568d69dd8699a6082/raw/b7b11a82873fab7456d06a55e9aa908723f23c38/market.txt";

        // Typewriter System
        const text = "RHYTHMIC BEATS PRESENTS... OPERATE IN SILENCE.";
        let idx = 0;
        function typeWriter() { if (idx < text.length) { document.getElementById("typewriter-text").innerHTML += text.charAt(idx); idx++; setTimeout(typeWriter, 80); } }
        window.addEventListener('DOMContentLoaded', typeWriter);

        // Speech Loader Initialization
        let systemVoices = [];
        function loadVoices() { if ('speechSynthesis' in window) systemVoices = window.speechSynthesis.getVoices(); }
        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = loadVoices;

        // CRITICAL DEEP MALE AUDIO FIX - SECURED ON-CLICK BYPASS
        function startExperience() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance("Rhythmic Beats Presents. Operate in silence.");
                msg.lang = 'en-US'; msg.rate = 0.70; msg.pitch = 0.1;
                
                if (systemVoices.length === 0) systemVoices = window.speechSynthesis.getVoices();
                const deepVoice = systemVoices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('google us english') || v.name.toLowerCase().includes('david'));
                if (deepVoice) msg.voice = deepVoice;
                window.speechSynthesis.speak(msg);
            }
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-overlay').style.display = 'none'; }, 500);
        }

        // LATEST CHRONOLOGICAL DATA INTERCEPTORS
        async function loadTracks() {
            try {
                const res = await fetch(`https://gist.githubusercontent.com/rhythmic-beats-genz/64a1f7ed6c5e1105064919c2774d2f01/raw/my-beats.json?nocache=${new Date().getTime()}`);
                const content = await res.json();
                cachedTracks = content.sort((a, b) => {
                    const timeA = a.timestamp ? new Date(a.timestamp).getTime() : (Number(a.time) || 0);
                    const timeB = b.timestamp ? new Date(b.timestamp).getTime() : (Number(b.time) || 0);
                    return timeB - timeA;
                });
                renderTracks();
            } catch (e) { console.error(e); }
        }

        function renderTracks() {
            const container = document.getElementById('track-list-container');
            const seeMoreWrap = document.getElementById('see-more-wrap');
            container.innerHTML = ''; seeMoreWrap.innerHTML = '';
            const toDisplay = showAllTracks ? cachedTracks : cachedTracks.slice(0, 5);
            
            toDisplay.forEach(track => {
                container.innerHTML += `<div class="track-card"><span class="track-name">${track.name}</span><a href="${track.link}" target="_blank" class="listen-btn">PLAY</a></div>`;
            });
            
            if (cachedTracks.length > 5) {
                const btn = document.createElement('button'); btn.className = 'btn-see-more';
                btn.innerHTML = showAllTracks ? `See Less <i class="fa-solid fa-angle-up"></i>` : `See More <i class="fa-solid fa-angle-down"></i>`;
                btn.onclick = () => { showAllTracks = !showAllTracks; renderTracks(); };
                seeMoreWrap.appendChild(btn);
            }
        }

        async function loadVideos() {
            try {
                const res = await fetch(`https://gist.githubusercontent.com/rhythmic-beats-genz/af3e05652f6d509849a4f5ae5762564d/raw/my-videos.txt?nocache=${new Date().getTime()}`);
                const content = await res.json();
                cachedVideos = content.sort((a, b) => (Number(b.timestamp) || 0) - (Number(a.timestamp) || 0));
                if(cachedVideos.length > 0) document.getElementById('main-yt-player').src = `https://www.youtube.com/embed/${cachedVideos[0].videoId}?autoplay=0`;
                renderVideos();
            } catch (e) { console.error(e); }
        }

        function renderVideos() {
            const container = document.getElementById('video-list-container');
            const seeMoreVideosWrap = document.getElementById('see-more-videos-wrap');
            container.innerHTML = ''; seeMoreVideosWrap.innerHTML = '';
            const toDisplay = showAllVideos ? cachedVideos : cachedVideos.slice(0, 4);
            
            toDisplay.forEach(video => {
                const card = document.createElement('div'); card.className = 'video-card';
                card.innerHTML = `<img src="https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg" class="video-thumb"><div class="video-details"><div class="video-title">${video.title}</div></div>`;
                card.onclick = () => { document.getElementById('main-yt-player').src = `https://www.youtube.com/embed/${video.videoId}?autoplay=0`; };
                container.appendChild(card);
            });
            
            if (cachedVideos.length > 4) {
                const btn = document.createElement('button'); btn.className = 'btn-see-more';
                btn.innerHTML = showAllVideos ? `See Less <i class="fa-solid fa-angle-up"></i>` : `See More <i class="fa-solid fa-angle-down"></i>`;
                btn.onclick = () => { showAllVideos = !showAllVideos; renderVideos(); };
                seeMoreVideosWrap.appendChild(btn);
            }
        }

        async function loadAffiliateMarkets() {
            try {
                const res = await fetch(`${MARKET_GIST_URL}?nocache=${new Date().getTime()}`);
                const markets = await res.json();
                const container = document.getElementById('market-container'); container.innerHTML = '';
                markets.forEach(m => {
                    container.innerHTML += `<a href="${m.link || '#'}" target="_blank" class="market-item"><span class="ali-custom-text">${m.name || 'Gear'}</span></a>`;
                });
            } catch (e) { console.error(e); }
        }
        
        loadTracks(); loadVideos(); loadAffiliateMarkets();

        // Strict Inspect Shield Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        }
    </script>
