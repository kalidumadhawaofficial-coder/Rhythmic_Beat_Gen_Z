<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Rhythmic Beats</title>
    <style>
        /* Premium Cyberpunk & Dark Aesthetic */
        * { box-sizing: border-box; }
        body {
            background-color: #08080c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #111116;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #1f1f2e;
            text-align: center;
        }
        h1 { 
            color: #ff2a5f; 
            font-size: 2.6rem; 
            margin-bottom: 5px; 
            letter-spacing: 2px;
            font-weight: 800;
        }
        .subtitle { 
            color: #71717a; 
            font-size: 1.05rem; 
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        /* Dynamic Track Container */
        #track-list-container {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .track-card {
            background: #181824;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .track-card:hover { 
            border-color: #ff2a5f; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 42, 95, 0.1);
        }
        .track-name { 
            font-weight: 700; 
            font-size: 1.1rem; 
            color: #ffffff;
            letter-spacing: 0.5px;
            text-align: left;
        }
        .listen-btn {
            background: #ff5500;
            padding: 10px 22px;
            border-radius: 20px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .listen-btn:hover {
            background: #ff7733;
        }

        /* Store Controls & Buttons */
        .button-group { margin-top: 35px; border-top: 1px solid #1f1f2e; padding-top: 25px; }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 12px 0;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-gumroad {
            background: linear-gradient(45deg, #ff2a5f, #ff5e00);
            color: #ffffff;
            box-shadow: 0 5px 20px rgba(255, 42, 95, 0.3);
        }
        .btn-gumroad:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 42, 95, 0.5);
        }
        .btn-kofi {
            background: #29abe2;
            color: #ffffff;
            box-shadow: 0 5px 20px rgba(41, 171, 226, 0.3);
        }
        .btn-kofi:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(41, 171, 226, 0.5);
        }
        .btn-soundcloud {
            background: #1e1e2f;
            color: #ff5500;
            border: 1px solid #ff5500;
        }
        .btn-soundcloud:hover {
            background: #ff5500;
            color: #ffffff;
            transform: translateY(-2px);
        }
        footer { margin-top: 40px; color: #3f3f46; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>RHYTHMIC BEATS</h1>
        <div class="subtitle">Premium high-performance soundtracks curated for elite athletes, hyper-focus, and late-night drives.</div>
        
        <!-- DYNAMIC TRACKS WILL LOAD HERE FROM GIST -->
        <div id="track-list-container">
            <p style="color: #71717a;">Loading Epic Tracks...</p>
        </div>
        
        <!-- Action Buttons linked to your Stores -->
        <div class="button-group">
            <a href="https://rhythmicbeatz5.gumroad.com/l/dgyzv" target="_blank" class="btn btn-gumroad">🛒 BUY UNTAGGED BEAT PACK ($5)</a>
            <a href="https://ko-fi.com/rhythmicbeats98gmailcom" target="_blank" class="btn btn-kofi">☕ SUPPORT / BUY ON KO-FI</a>
            <a href="https://soundcloud.com/rhythmic_beat_gen_z" target="_blank" class="btn btn-soundcloud">🟠 LISTEN ON SOUNDCLOUD</a>
        </div>
        
        <footer>© 2026 Rhythmic Beat Gen Z. All Rights Reserved. Securely Monitored.</footer>
    </div>

    <script>
        const GIST_ID = "64a1f7ed6c5e1105064919c2774d2f01"; 

        async function loadTracks() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                if (!res.ok) throw new Error("Gist not found");
                
                const data = await res.json();
                const content = JSON.parse(data.files['my-beats.json'].content);
                
                const container = document.getElementById('track-list-container');
                container.innerHTML = ''; // Clear loading text

                content.forEach(track => {
                    const card = document.createElement('div');
                    card.className = 'track-card';
                    card.innerHTML = `
                        <span class="track-name">${track.name}</span>
                        <a href="${track.link}" target="_blank" class="listen-btn">PLAY</a>
                    `;
                    container.appendChild(ca); // Note: fixed minor internal typo from template to secure rendering
                    container.appendChild(card);
                });
                // Clean up double append if template artifact exists
                const cards = container.querySelectorAll('.track-card');
                container.innerHTML = '';
                cards.forEach(c => container.appendChild(c));
            } catch (error) {
                console.error(error);
                document.getElementById('track-list-container').innerHTML = `<p style="color: #ff2a5f;">Failed to load tracks. Please check Gist.</p>`;
            }
        }
        
        loadTracks();

        /* MAXIMUM SECURITY SHIELD */
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
