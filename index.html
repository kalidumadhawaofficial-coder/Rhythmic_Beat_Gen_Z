<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Rhythmic Beats</title>
    <style>
        /* Premium Cyberpunk & Dark Aesthetic */
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #08080c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: block;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: #111116;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #1f1f2e;
            text-align: center;
        }
        h1 { 
            color: #ff2a5f; 
            font-size: 2.6rem; 
            margin-bottom: 5px; 
            letter-spacing: 2px;
            font-weight: 800;
        }
        .subtitle { 
            color: #71717a; 
            font-size: 1.05rem; 
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        /* Premium Audio Player Container */
        .player-box {
            background: #181824;
            border: 1px solid #2a2a3a;
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
        }
        .track-info {
            color: #e4e4e7;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .genre-tag {
            color: #ffaa00;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: inline-block;
        }
        audio {
            width: 100%;
            margin-top: 10px;
            outline: none;
        }
        
        /* Store Controls & Buttons */
        .button-group {
            margin-top: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 12px 0;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-gumroad {
            background: linear-gradient(45deg, #ff2a5f, #ff5e00);
            color: #ffffff;
            box-shadow: 0 5px 20px rgba(255, 42, 95, 0.3);
        }
        .btn-gumroad:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 42, 95, 0.5);
        }
        .btn-soundcloud {
            background: #1e1e2f;
            color: #ff5500;
            border: 1px solid #ff5500;
        }
        .btn-soundcloud:hover {
            background: #ff5500;
            color: #ffffff;
            transform: translateY(-2px);
        }
        
        footer {
            margin-top: 40px;
            color: #3f3f46;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RHYTHMIC BEATS</h1>
        <div class="subtitle">Premium high-performance soundtracks curated for elite athletes, hyper-focus, and late-night drives.</div>
        
        <div class="player-box">
            <div class="track-info">⚡ Neon Drive (Preview)</div>
            <div class="genre-tag">Gen Z Phonk / Aggressive</div>
            
            <audio controls controlsList="nodownload">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
        </div>
        
        <div class="button-group">
            <a href="https://gumroad.com" target="_blank" class="btn btn-gumroad">🛒 BUY UNTAGGED BEAT PACK ($5)</a>
            <a href="https://soundcloud.com" target="_blank" class="btn btn-soundcloud">🟠 LISTEN ON SOUNDCLOUD</a>
        </div>
        
        <footer>© 2026 Rhythmic Beat Gen Z. All Rights Reserved. Securely Monitored.</footer>
    </div>

    <script>
        /* MAXIMUM SECURITY SHIELD - ANTI COPY & CLONE */
        
        // 1. Block Right-Click (Anti-Audio theft)
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 2. Block Developer Tools & Source View Hotkeys
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U (View Source)
        }
    </script>
</body>
</html>
