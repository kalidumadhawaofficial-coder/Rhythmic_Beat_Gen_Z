<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Rhythmic Beats</title>
    <style>
        /* Dark Aesthetic Design */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }
        h1 { color: #ff3366; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #888; font-size: 1.1rem; }
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff3366, #ff6600);
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255,51,102,0.3);
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>RHYTHMIC BEATS</h1>
        <p>Premium, high-performance beats crafted for elite athletes, creators, and late-night drives.</p>
        <hr style="border: 0; border-top: 1px solid #2d2d2d; margin: 30px 0;">
        <p>Our Premium Music Player and Gumroad Store are connecting now...</p>
        <a href="#" class="btn">Explore Soundcloud</a>
    </div>

    <script>
        /* MAXIMUM SECURITY: Anti-Copy & Anti-Phishing Core */
        // 1. Right Click Block කිරීම (සින්දු හොරකම් කරන්න බෑ)
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Keyboard Shortcuts Block කිරීම (F12, Ctrl+U වගේ ඒවා සෙකියුරිටි එකට)
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
