<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythmic Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button class="nav-btn" onclick="show('shorts')">Shorts</button>
        <button class="nav-btn" onclick="show('rate')">Rate</button>
        <button class="nav-btn" onclick="show('suggest')">Suggest</button>
        <button class="nav-btn" onclick="show('contact')">Contact</button>
    </nav>

    <div id="shorts" class="page"><div id="shorts-container" class="shorts-container"></div></div>
    
    <div id="rate" class="page" style="display:none;">
        <img src="1000098019.webp" class="logo">
        <h2 class="theme-text">OPERATE IN SILENCE</h2>
        <div class="star-rating">
            <span onclick="rate(5)">★</span><span onclick="rate(4)">★</span><span onclick="rate(3)">★</span><span onclick="rate(2)">★</span><span onclick="rate(1)">★</span>
        </div>
        <textarea class="neon-input" placeholder="Your feedback..."></textarea>
        <button class="neon-btn">SEND RATING 📩</button>
    </div>

    <div id="suggest" class="page" style="display:none;">
        <img src="1000098019.webp" class="logo">
        <h2 class="theme-text">OPERATE IN SILENCE</h2>
        <textarea class="neon-input" placeholder="Suggest something new..."></textarea>
        <button class="neon-btn">SEND SUGGESTION 🚀</button>
    </div>

    <div id="contact" class="page" style="display:none;">
        <img src="1000098019.webp" class="logo">
        <h2 class="theme-text">OPERATE IN SILENCE</h2>
        <p>Email: <a href="mailto:rhythmic@beats.com" style="color:#00d4ff">rhythmic@beats.com</a></p>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function rate(stars) { alert('Rated ' + stars + ' stars!'); }
        function react(btn) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
