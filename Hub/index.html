<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rhythmic Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button class="nav-btn" onclick="show('shorts')">Shorts</button>
        <button class="nav-btn" onclick="show('rate')">Rate</button>
        <button class="nav-btn" onclick="show('suggest')">Suggest</button>
        <button class="nav-btn" onclick="show('contact')">Contact</button>
    </nav>

    <div id="shorts" class="page">
        <div id="shorts-container" class="shorts-container"></div>
    </div>
    <!-- Anith pages... -->

    <script src="YOUR_RAW_GIST_LINK"></script>
    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        const container = document.getElementById('shorts-container');
        videos.sort((a, b) => new Date(b.date) - new Date(a.date));
        videos.forEach(v => {
            container.innerHTML += `
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe>
                    <div class="reactions">
                        <button onclick="react('${v.id}', 'heart')">❤️</button>
                        <button onclick="react('${v.id}', 'like')">👍</button>
                        <button onclick="react('${v.id}', 'dislike')">👎</button>
                    </div>
                </div>`;
        });

        function react(id, type) {
            // Methana api localstorage use karala e user ge reactions save karamu
            alert('You ' + type + 'd video: ' + id);
        }
    </script>
</body>
</html>
